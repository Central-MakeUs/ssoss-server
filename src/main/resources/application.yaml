spring:
  application:
    name: ssoss-backend
  profiles:
    default: local
logging:
  level:
    org.zalando.logbook: TRACE
logbook:
  format:
    style: http
  write:
    max-body-size: 2000
scalar:
  enabled: true
  path: /scalar
auth:
  jwt:
    secret: local-only-secret-key-at-least-256-bits-long!!!!
    access-ttl: 30m
    refresh-ttl: 14d
  oauth:
    naver:
      profile-url: https://openapi.naver.com/v1/nid/me
      connect-timeout: 3s
      read-timeout: 5s

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://localhost:3306/mydatabase
    username: myuser
    password: secret

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
auth:
  jwt:
    secret: ${AUTH_JWT_SECRET}
