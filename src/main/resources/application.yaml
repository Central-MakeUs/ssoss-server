spring:
  application:
    name: ssoss-backend
  profiles:
    default: local
  threads:
    virtual:
      enabled: true
  task:
    execution:
      thread-name-prefix: async-
      simple:
        concurrency-limit: 100
      shutdown:
        await-termination: true
        await-termination-period: 60s
logging:
  level:
    org.zalando.logbook: TRACE
logbook:
  format:
    style: http
  write:
    max-body-size: 2000
  predicate:
    exclude:
      - path: /scalar
      - path: /scalar/**
      - path: /v3/api-docs
      - path: /v3/api-docs/**
      - path: /favicon.ico
      - path: /favicon.svg
scalar:
  enabled: true
  path: /scalar
auth:
  access-ttl: 30m
  refresh-ttl: 14d
  jwt:
    secret: local-only-secret-key-at-least-256-bits-long!!!!
  oauth:
    naver:
      profile-url: https://openapi.naver.com/v1/nid/me
      connect-timeout: 3s
      read-timeout: 5s
    apple:
      jwks-url: https://appleid.apple.com/auth/keys
      client-id: local-only-apple-client-id
      connect-timeout: 3s
      read-timeout: 5s

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://localhost:3306/mydatabase
    username: myuser
    password: secret

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
auth:
  jwt:
    secret: ${AUTH_JWT_SECRET}
  oauth:
    apple:
      client-id: ${APPLE_CLIENT_ID}
